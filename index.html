<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Asistencia - Procesador de Reportes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #f0f2f5; font-family: 'Segoe UI', sans-serif; }
        .drop-zone { border: 2px dashed #007bff; border-radius: 15px; padding: 40px; text-align: center; background: white; transition: 0.3s; cursor: pointer; }
        .drop-zone:hover { background: #e9ecef; }
        .card-custom { border: none; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .status-badge { width: 10px; height: 10px; display: inline-block; border-radius: 50%; margin-right: 5px; }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="text-center mb-5">
        <h1 class="fw-bold">Reporte de Asistencia y Discrepancias</h1>
        <p class="text-muted">Carga los 5 archivos Excel para generar el dashboard consolidado</p>
    </div>

    <div class="row justify-content-center mb-5">
        <div class="col-md-8">
            <div id="dropZone" class="drop-zone">
                <h4 class="text-primary">Arrastra los 5 archivos aquí</h4>
                <p>O haz clic para seleccionarlos</p>
                <input type="file" id="fileInput" multiple accept=".xlsx, .xls, .csv" style="display: none;">
                <div id="fileList" class="mt-3 small text-muted"></div>
            </div>
            <div class="text-center mt-3">
                <button id="btnProcesar" class="btn btn-success btn-lg shadow" disabled>Procesar Reportes</button>
            </div>
        </div>
    </div>

    <div id="dashboard" style="display: none;">
        <div class="row mb-4">
            <div class="col-md-3">
                <div class="card card-custom p-3 text-center">
                    <h6 class="text-muted">Personal Total</h6>
                    <h2 id="txtTotal">0</h2>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card card-custom p-3 text-center border-start border-danger border-5">
                    <h6 class="text-muted">Tardanzas</h6>
                    <h2 id="txtTardanzas" class="text-danger">0</h2>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card card-custom p-3 text-center border-start border-warning border-5">
                    <h6 class="text-muted">Omisiones</h6>
                    <h2 id="txtOmisiones" class="text-warning">0</h2>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card card-custom p-3 text-center border-start border-success border-5">
                    <h6 class="text-muted">H. Extra Totales</h6>
                    <h2 id="txtExtras" class="text-success">0h</h2>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-md-7">
                <div class="card card-custom p-4">
                    <h5>Cumplimiento por Área (%)</h5>
                    <canvas id="chartCumplimiento"></canvas>
                </div>
            </div>
            <div class="col-md-5">
                <div class="card card-custom p-4">
                    <h5>Alertas Críticas</h5>
                    <div id="listaAlertas" class="overflow-auto" style="max-height: 300px;">
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const btnProcesar = document.getElementById('btnProcesar');
    const fileList = document.getElementById('fileList');
    let archivosCargados = [];

    // Manejo de Archivos
    dropZone.onclick = () => fileInput.click();

    fileInput.onchange = (e) => manejarArchivos(e.target.files);

    function manejarArchivos(files) {
        archivosCargados = Array.from(files);
        fileList.innerHTML = archivosCargados.map(f => `<li>${f.name}</li>`).join('');
        btnProcesar.disabled = archivosCargados.length === 0;
    }

    btnProcesar.onclick = async () => {
        const dataConsolidada = {};

        for (const file of archivosCargados) {
            const data = await leerExcel(file);
            // Aquí iría la lógica de cruce por DNI/ID según tus columnas
            // Por ahora simularemos el procesamiento para mostrar el Dashboard
        }

        mostrarDashboard();
    };

    function leerExcel(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                const workbook = XLSX.read(e.target.result, { type: 'binary' });
                const sheetName = workbook.SheetNames[0];
                resolve(XLSX.utils.sheet_to_json(workbook.Sheets[sheetName]));
            };
            reader.readAsBinaryString(file);
        });
    }

    function mostrarDashboard() {
        document.getElementById('dashboard').style.display = 'block';
        document.getElementById('txtTotal').innerText = "150"; // Ejemplo
        document.getElementById('txtTardanzas').innerText = "12";
        document.getElementById('txtOmisiones').innerText = "5";
        document.getElementById('txtExtras').innerText = "42.5h";

        renderChart();
    }

    function renderChart() {
        const ctx = document.getElementById('chartCumplimiento').getContext('2d');
        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['Logística', 'Ventas', 'Admin', 'Sistemas', 'Caja'],
                datasets: [{
                    label: '% Cumplimiento',
                    data: [92, 88, 95, 84, 90],
                    backgroundColor: '#007bff'
                }]
            },
            options: { responsive: true, plugins: { legend: { display: false } } }
        });
    }
</script>

</body>
</html>
